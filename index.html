<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jim's Runner Game</title>
<style>
  :root{ --paper:#f6f2e8; --pencil:#3a3a3a; --pencil-light:#8a8a86; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;touch-action:none}
  body{
    background:var(--paper);
    font-family:"Comic Sans MS","Segoe Print","Bradley Hand",cursive;
    color:var(--pencil);
    display:flex;flex-direction:column;height:100%;
  }
  header{padding:8px 16px 2px;text-align:center;flex:0 0 auto}
  header h1{font-size:clamp(20px,4vw,30px);letter-spacing:1px}
  header p{font-size:clamp(10px,1.8vw,13px);color:var(--pencil-light)}
  #stage{flex:1 1 auto;position:relative;min-height:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #hud{
    position:absolute;top:8px;left:14px;right:14px;
    display:flex;justify-content:space-between;align-items:flex-start;
    font-size:clamp(14px,2.4vw,20px);pointer-events:none;
  }
  #hearts{letter-spacing:3px;font-size:clamp(18px,3vw,26px)}
  #power{font-size:clamp(11px,2vw,14px);color:var(--pencil-light)}
  #touch{
    position:absolute;left:0;right:0;bottom:10px;
    display:flex;justify-content:space-between;padding:0 14px;pointer-events:none;
  }
  .tgroup{display:flex;gap:12px;pointer-events:auto}
  .tbtn{
    width:64px;height:64px;border-radius:50%;
    border:3px solid var(--pencil);background:rgba(255,255,255,.55);
    font-size:26px;font-family:inherit;color:var(--pencil);
    user-select:none;-webkit-user-select:none;transform:rotate(-2deg);
    box-shadow:2px 3px 0 rgba(58,58,58,.25);
  }
  .tbtn:active{background:rgba(58,58,58,.15);transform:rotate(-2deg) scale(.95)}
  .tbtn:nth-child(2){transform:rotate(2deg)}
  @media (hover:hover) and (pointer:fine){ #touch{display:none} }
  #overlay{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(246,242,232,.88);
  }
  #overlay .card{
    text-align:center;border:4px solid var(--pencil);border-radius:18px 22px 16px 24px;
    padding:28px 44px;background:var(--paper);transform:rotate(-1.2deg);
    box-shadow:4px 5px 0 rgba(58,58,58,.3);
  }
  #overlay h2{font-size:clamp(26px,5vw,40px);margin-bottom:8px}
  #overlay p{margin:4px 0;font-size:clamp(14px,2.6vw,20px)}
  #overlay button{
    margin-top:16px;font-family:inherit;font-size:clamp(16px,3vw,22px);
    padding:8px 26px;border:3px solid var(--pencil);border-radius:14px 18px 12px 20px;
    background:#fff;color:var(--pencil);cursor:pointer;transform:rotate(1deg);
    box-shadow:3px 3px 0 rgba(58,58,58,.3);
  }
  #overlay button:active{transform:rotate(1deg) scale(.95)}
</style>
</head>
<body>
<header>
  <h1>JIM'S RUNNER GAME</h1>
  <p>Arrow keys or A / D to run · Space or ↑ to jump · jump on enemies to squash them · watch out for cactuses!</p>
</header>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="hud">
    <div>score: <span id="score">0</span> &nbsp; distance: <span id="dist">0</span> m</div>
    <div style="text-align:right">
      <div id="hearts">♥ ♥ ♥</div>
      <div id="power"></div>
    </div>
  </div>
  <div id="touch">
    <div class="tgroup">
      <button class="tbtn" id="btnL">◀</button>
      <button class="tbtn" id="btnR">▶</button>
    </div>
    <div class="tgroup">
      <button class="tbtn" id="btnJ">⤒</button>
    </div>
  </div>
  <div id="overlay">
    <div class="card">
      <h2>GAME OVER!</h2>
      <p>score: <span id="finalScore">0</span></p>
      <p>distance: <span id="finalDist">0</span> m</p>
      <p id="bestLine" style="display:none">new best score! ★</p>
      <button id="restart">play again</button>
    </div>
  </div>
</div>

let loaded = 0;
const total = Object.keys(SPRITES).length;
for (const [k,src] of Object.entries(SPRITES)){
  const im = new Image();
  im.onload = ()=>{ if(++loaded===total){ buildWorld(); requestAnimationFrame(loop); } };

// ================= canvas =================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1,2);
  const r = canvas.parentElement.getBoundingClientRect();
  W=r.width;H=r.height;
  canvas.width=W*DPR;canvas.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

// ================= helpers =================
function hash(n){ n=Math.sin(n*127.1)*43758.5453; return n-Math.floor(n); }
function wob(seed,amp){ return (hash(seed)-0.5)*2*amp; }
function pencilLine(x1,y1,x2,y2,seed,amp=2.5,segs=8){
  ctx.beginPath();
  ctx.moveTo(x1+wob(seed,amp),y1+wob(seed+1,amp));
  for(let i=1;i<=segs;i++){
    const t=i/segs;
    ctx.lineTo(x1+(x2-x1)*t+wob(seed+i*2,amp),y1+(y2-y1)*t+wob(seed+i*2+1,amp));
  }
  ctx.stroke();
}
function overlap(ax,ay,aw,ah, bx,by,bw,bh){ // boxes centered x, y = feet
  return Math.abs(ax-bx) < (aw+bw)/2 && (ay > by-bh) && (by > ay-ah);
}

// ================= constants =================
const GROUND_FRAC=0.80, heroH=120;
const GRAV=2600, JUMP=-1050, SUPERJUMP=-1420, SPEED=420;
const CHUNK=520;
function groundY(){ return H*GROUND_FRAC; }

// ================= state =================
const player={x:0,y:0,vx:0,vy:0,onGround:true,facing:1,moving:false,runPhase:0,
  lives:3, inv:0, shield:false, hatTime:0};
let platforms=[], items=[], hazards=[], enemies=[], pops=[], sparkles=[];
let score=0, maxDist=0, bestScore=0, gameOver=false, worldTime=0;

const VALUES={coin:10, ruby:25, star:50, trophy:100};
const scoreEl=document.getElementById('score'), distEl=document.getElementById('dist');
const heartsEl=document.getElementById('hearts'), powerEl=document.getElementById('power');
const overlayEl=document.getElementById('overlay');

function platY(p){ return groundY()-p.lvl*135; }

function buildWorld(){
  platforms=[];items=[];hazards=[];enemies=[];pops=[];sparkles=[];
  for(let i=0;i<400;i++){
    const seed=i*101;
    const bx=700+i*CHUNK+wob(i*7,110);
    const wpl=190+hash(i*13)*130;
    const lvl=1+Math.floor(hash(i*29)*2);
    platforms.push({x:bx,w:wpl,lvl,seed});

    // ---- collectables above platforms ----
    const py=()=> -lvl*135; // offset from ground, resolved at draw/update via groundY
    const r=hash(i*3.7);
    if(i%8===5){
      items.push({type:'trophy', x:bx+wpl/2, lvl, over:60, seed:seed+9});
    } else if(r<0.14){
      items.push({type:'star', x:bx+wpl/2, lvl, over:60, seed:seed+9});
    } else if(r<0.34){
      items.push({type:'ruby', x:bx+wpl/2, lvl, over:60, seed:seed+9});
    } else if(r<0.8){
      for(let c=0;c<3;c++) items.push({type:'coin', x:bx+wpl*(0.25+0.25*c), lvl, over:60, seed:seed+c});
    }
    // power-ups float over the ground between platforms
    if(i%9===4) items.push({type:'wonderhat', x:bx+CHUNK*0.55, lvl:0, over:110, seed:seed+31});
    if(i%11===7) items.push({type:'plate', x:bx+CHUNK*0.5, lvl:0, over:110, seed:seed+37});
    // arc of ground coins
    if(hash(i*5.1)<0.35){
      for(let c=0;c<4;c++) items.push({type:'coin', x:bx-220+c*46, lvl:0, over:46+Math.sin(c/3*Math.PI)*46, seed:seed+50+c});
    }

    // ---- hazards on the ground ----
    if(i>0){
      const hr=hash(i*8.3);
      if(hr<0.22) hazards.push({type:'cactus', x:bx-CHUNK*0.42, seed:seed+60});
      else if(hr<0.4) hazards.push({type:'brick', x:bx-CHUNK*0.42, seed:seed+60});
      else if(hr<0.52) hazards.push({type:'turtle', x:bx-CHUNK*0.42, x0:bx-CHUNK*0.42-70, x1:bx-CHUNK*0.42+70, dir:1, seed:seed+60});
    }

    // ---- enemies ----
    if(i>1){
      const er=hash(i*12.9);
      if(er<0.3) enemies.push({type:'walkhat', x:bx+90, x0:bx+40, x1:bx+wpl+180, dir:1, speed:95, lvl:0, alive:true, seed:seed+70});
      else if(er<0.46) enemies.push({type:'toothbrush', x:bx+120, x0:bx+60, x1:bx+wpl+220, dir:-1, speed:150, lvl:0, alive:true, seed:seed+70});
      if(i%4===2) enemies.push({type:'flymouth', x:bx+CHUNK*0.5, baseX:bx+CHUNK*0.5, range:130, h:190+hash(i*4.4)*90, alive:true, seed:seed+80});
    }
  }
}

// ================= input =================
const keys={};
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '||e.key==='ArrowUp'||e.key.toLowerCase()==='w') tryJump();
});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
function bindHold(id,key){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[key]=true;if(key==='jump')tryJump();};
  const off=e=>{e.preventDefault();keys[key]=false;};
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off);
  el.addEventListener('pointercancel',off);
}
bindHold('btnL','arrowleft');bindHold('btnR','arrowright');bindHold('btnJ','jump');
function tryJump(){
  if(gameOver) return;
  if(player.onGround){
    player.vy = player.hatTime>0 ? SUPERJUMP : JUMP;
    player.onGround=false;
  }
}
document.getElementById('restart').addEventListener('click',()=>{
  score=0;maxDist=0;gameOver=false;
  player.x=0;player.y=groundY();player.vx=0;player.vy=0;
  player.lives=3;player.inv=0;player.shield=false;player.hatTime=0;player.onGround=true;
  buildWorld();updateHud();
  overlayEl.style.display='none';
});

// ================= effects =================
function addPop(x,y,text){ pops.push({x,y,text,t:0}); }
function addBurst(x,y){
  for(let i=0;i<7;i++){
    sparkles.push({x,y,vx:Math.cos(i/7*6.28)*(120+hash(i*3)*90),vy:Math.sin(i/7*6.28)*(120+hash(i*5)*90)-120,t:0});
  }
}

// ================= update =================
let last=0;
function updateHud(){
  scoreEl.textContent=score;
  distEl.textContent=maxDist;
  heartsEl.textContent='♥ '.repeat(player.lives).trim() || '—';
  let p=[];
  if(player.shield) p.push('resilience plate: 1 free hit!');
  if(player.hatTime>0) p.push('wonderhat! super jump '+Math.ceil(player.hatTime)+'s');
  powerEl.textContent=p.join(' · ');
}

function hurt(fromX){
  if(player.inv>0 || gameOver) return;
  if(player.shield){
    player.shield=false;
    addPop(player.x, player.y-heroH, 'plate saved you!');
  } else {
    player.lives--;
    addPop(player.x, player.y-heroH, 'ouch!');
    if(player.lives<=0){
      gameOver=true;
      document.getElementById('finalScore').textContent=score;
      document.getElementById('finalDist').textContent=maxDist;
      const best = score>bestScore;
      if(best) bestScore=score;
      document.getElementById('bestLine').style.display = best&&score>0 ? 'block':'none';
      overlayEl.style.display='flex';
    }
  }
  player.inv=1.6;
  player.vy=-520;
  player.vx = player.x>fromX ? 300 : -300;
  player.x += player.x>fromX ? 26 : -26;
  updateHud();
}

function itemSize(t){
  const im=imgs[t];
  const h={coin:44,ruby:46,star:50,trophy:64,wonderhat:56,plate:56}[t];
  return {w: im.naturalWidth*h/im.naturalHeight, h};
}
function enemySize(t){
  const h={walkhat:64,toothbrush:88,flymouth:60,turtle:62,cactus:104,brick:84}[t];
  const im=imgs[t];
  return {w: im.naturalWidth*h/im.naturalHeight, h};
}

function update(dt){
  if(gameOver) return;
  worldTime+=dt;
  const gy=groundY();

  // ---- player movement ----
  const left=keys['arrowleft']||keys['a'], right=keys['arrowright']||keys['d'];
  player.vx=(right?SPEED:0)-(left?SPEED:0);
  player.moving=player.vx!==0;
  if(player.vx>0)player.facing=1;
  if(player.vx<0)player.facing=-1;
  player.x+=player.vx*dt;
  if(player.x<0)player.x=0;

  player.vy+=GRAV*dt;
  player.y+=player.vy*dt;
  player.onGround=false;
  if(player.vy>=0){
    for(const p of platforms){
      const py=platY(p);
      if(player.x>p.x-20 && player.x<p.x+p.w+20 &&
         player.y>=py-14 && player.y<=py+Math.max(26,player.vy*dt+16)){
        player.y=py;player.vy=0;player.onGround=true;
      }
    }
  }
  if(player.y>=gy){player.y=gy;player.vy=0;player.onGround=true;}
  if(player.moving&&player.onGround)player.runPhase+=dt*14;
  if(player.inv>0)player.inv-=dt;
  if(player.hatTime>0){player.hatTime-=dt;if(player.hatTime<=0)updateHud();}

  // ---- collectables ----
  for(const it of items){
    if(it.got)continue;
    const iy = gy - it.lvl*135 - it.over + Math.sin(worldTime*3+it.seed)*6;
    const s=itemSize(it.type);
    if(overlap(player.x,player.y,60,heroH, it.x,iy+s.h/2,s.w+16,s.h+16)){
      it.got=true;
      if(it.type==='wonderhat'){ player.hatTime=8; addPop(it.x,iy,'WONDERHAT!'); }
      else if(it.type==='plate'){ player.shield=true; addPop(it.x,iy,'resilience +1'); }
      else { score+=VALUES[it.type]; addPop(it.x,iy,'+'+VALUES[it.type]); }
      addBurst(it.x,iy);
      updateHud();
    }
  }

  // ---- hazards ----
  for(const hz of hazards){
    if(hz.type==='turtle'){
      hz.x+=hz.dir*32*dt;
      if(hz.x<hz.x0)hz.dir=1;
      if(hz.x>hz.x1)hz.dir=-1;
    }
    const s=enemySize(hz.type);
    if(overlap(player.x,player.y,44,heroH-16, hz.x,gy,s.w-24,s.h-12)) hurt(hz.x);
  }

  // ---- enemies ----
  for(const en of enemies){
    if(!en.alive)continue;
    let ey;
    if(en.type==='flymouth'){
      en.x=en.baseX+Math.sin(worldTime*0.9+en.seed)*en.range;
      ey=gy-en.h+Math.sin(worldTime*2.2+en.seed)*26;
      en.dir=Math.cos(worldTime*0.9+en.seed)>0?1:-1;
    } else {
      en.x+=en.dir*en.speed*dt;
      if(en.x<en.x0)en.dir=1;
      if(en.x>en.x1)en.dir=-1;
      ey=gy;
    }
    en.drawY=ey;
    const s=enemySize(en.type);
    // stomp?
    const feet=player.y, top=ey-s.h;
    if(player.vy>140 && Math.abs(player.x-en.x)<(s.w+40)/2 && feet>top-8 && feet<top+s.h*0.6){
      en.alive=false;
      score+=30;
      addPop(en.x,top,'+30 squashed!');
      addBurst(en.x,top+20);
      player.vy=-680;
      updateHud();
    } else if(overlap(player.x,player.y,44,heroH-16, en.x,ey,s.w-20,s.h-8)){
      hurt(en.x);
    }
  }

  // ---- effects ----
  for(const p of pops)p.t+=dt;
  pops=pops.filter(p=>p.t<1);
  for(const sp of sparkles){sp.t+=dt;sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.vy+=900*dt;}
  sparkles=sparkles.filter(s=>s.t<0.7);

  maxDist=Math.max(maxDist,Math.round(player.x/60));
  distEl.textContent=maxDist;
}

// ================= drawing =================
function drawBackground(cam){
  const gy=groundY();
  // city skyline (kid drawing), parallax + faded so it sits behind
  const bg=imgs.background;
  const bh=Math.min(H*0.42, 300), bw=bg.naturalWidth*bh/bg.naturalHeight;
  ctx.globalAlpha=0.45;
  const span=bw+140;
  const start=Math.floor((cam*0.2)/span)-1;
  for(let i=start;i<start+Math.ceil(W/span)+2;i++){
    ctx.drawImage(bg, i*span-cam*0.2, gy-bh+6, bw, bh);
  }
  ctx.globalAlpha=1;
  // sun doodle
  const sx=W-110-(cam*0.02)%40, sy=70;
  ctx.strokeStyle='rgba(58,58,58,0.45)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(sx,sy,24,0,7);ctx.stroke();
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    pencilLine(sx+Math.cos(a)*32,sy+Math.sin(a)*32,sx+Math.cos(a)*45,sy+Math.sin(a)*45,i*5+400,1.5,2);
  }
  // clouds
  ctx.lineWidth=2;
  for(let i=0;i<4;i++){
    const cspan=900;
    const cx=(i*cspan*0.9-(cam*0.1)%cspan+cspan)%cspan+i*130;
    const cy=52+hash(i*17)*70;
    ctx.strokeStyle='rgba(58,58,58,0.3)';
    ctx.beginPath();
    ctx.arc(cx,cy,16,Math.PI*0.5,Math.PI*1.5);
    ctx.arc(cx+20,cy-12,14,Math.PI,Math.PI*1.9);
    ctx.arc(cx+42,cy,16,Math.PI*1.5,Math.PI*0.5);
    ctx.stroke();
    pencilLine(cx,cy+16,cx+42,cy+16,i*31+600,1.5,3);
  }
}

function drawGround(cam){
  const gy=groundY();
  const g=imgs.ground;
  const gh=Math.min(H-gy+4, 110), gw=g.naturalWidth*gh/g.naturalHeight;
  const start=Math.floor(cam/gw)-1;
  for(let i=start;i<start+Math.ceil(W/gw)+2;i++){
    ctx.drawImage(g, i*gw-cam, gy-8, gw+1, gh);
  }
  // pencil line along the top so the walking surface is clear
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=3;
  const seg=140, s2=Math.floor(cam/seg)-1;
  for(let i=s2;i<s2+Math.ceil(W/seg)+3;i++){
    pencilLine(i*seg-cam,gy,(i+1)*seg-cam,gy,i*11,2,4);
  }
}

function drawPlatforms(cam){
  const pl=imgs.platform;
  for(const p of platforms){
    const x=p.x-cam;
    if(x+p.w<-60||x>W+60)continue;
    const y=platY(p);
    const ph=pl.naturalHeight*(p.w/pl.naturalWidth);
    ctx.drawImage(pl, x, y-6, p.w, Math.max(26,ph));
  }
}

function drawItems(cam){
  const gy=groundY();
  for(const it of items){
    if(it.got)continue;
    const x=it.x-cam;
    if(x<-60||x>W+60)continue;
    const s=itemSize(it.type);
    const iy=gy-it.lvl*135-it.over+Math.sin(worldTime*3+it.seed)*6;
    ctx.drawImage(imgs[it.type], x-s.w/2, iy-s.h/2, s.w, s.h);
  }
}

function drawHazardsAndEnemies(cam){
  const gy=groundY();
  for(const hz of hazards){
    const x=hz.x-cam;
    if(x<-100||x>W+100)continue;
    const s=enemySize(hz.type);
    if(hz.type==='turtle'){
      ctx.save();
      ctx.translate(x,gy-s.h/2);
      ctx.scale(hz.dir<0?1:-1,1); // drawing faces left
      ctx.drawImage(imgs.turtle,-s.w/2,-s.h/2,s.w,s.h);
      ctx.restore();
    } else {
      ctx.drawImage(imgs[hz.type], x-s.w/2, gy-s.h, s.w, s.h);
    }
  }
  for(const en of enemies){
    if(!en.alive)continue;
    const x=en.x-cam;
    if(x<-120||x>W+120)continue;
    const s=enemySize(en.type);
    const ey=en.drawY??gy;
    const bob=en.type==='walkhat'?Math.abs(Math.sin(worldTime*8+en.seed))*-5:0;
    ctx.save();
    ctx.translate(x,ey-s.h/2+bob);
    ctx.scale(en.dir>0?-1:1,1);
    if(en.type==='flymouth') ctx.rotate(Math.sin(worldTime*4+en.seed)*0.08);
    ctx.drawImage(imgs[en.type],-s.w/2,-s.h/2,s.w,s.h);
    ctx.restore();
  }
}

function drawPlayer(cam,t){
  if(gameOver)return;
  let im,rot=0,bob=0;
  if(!player.onGround)im=imgs.jumping;
  else if(player.moving){im=imgs.running;rot=Math.sin(player.runPhase)*0.09;bob=Math.abs(Math.sin(player.runPhase))*-7;}
  else{im=imgs.standing;bob=Math.sin(t/450)*2;}
  const scale=heroH/im.naturalHeight;
  const w=im.naturalWidth*scale,h=heroH;
  const px=player.x-cam,py=player.y+bob;
  // shadow
  const gy=groundY();
  let shY=gy;
  for(const p of platforms){
    const py2=platY(p);
    if(player.x>p.x-10&&player.x<p.x+p.w+10&&py2>=player.y-4&&py2<shY)shY=py2;
  }
  const airFade=Math.max(0.15,1-(shY-player.y)/300);
  ctx.fillStyle=`rgba(58,58,58,${0.16*airFade})`;
  ctx.beginPath();ctx.ellipse(px,shY+6,w*0.42*airFade+8,7,0,0,7);ctx.fill();
  // invincibility flicker
  if(player.inv>0 && Math.floor(t/90)%2===0) ctx.globalAlpha=0.35;
  ctx.save();
  ctx.translate(px,py-h/2);
  ctx.rotate(rot*player.facing);
  ctx.scale(player.facing,1);
  ctx.drawImage(im,-w/2,-h/2,w,h);
  ctx.restore();
  ctx.globalAlpha=1;
  // wonderhat sparkles
  if(player.hatTime>0){
    ctx.strokeStyle='rgba(58,58,58,0.7)';ctx.lineWidth=1.6;
    for(let i=0;i<3;i++){
      const a=t/300+i*2.1;
      const sx=px+Math.cos(a)*(w*0.7),sy=py-h*0.7+Math.sin(a*1.3)*24;
      pencilLine(sx-5,sy,sx+5,sy,i*7+t,0.5,1);
      pencilLine(sx,sy-5,sx,sy+5,i*9+t,0.5,1);
    }
  }
  // shield ring
  if(player.shield){
    ctx.strokeStyle='rgba(58,58,58,0.5)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.ellipse(px,py-h/2,w*0.85,h*0.62,0,0,7);ctx.stroke();
  }
}

function drawEffects(cam){
  ctx.fillStyle='#3a3a3a';
  ctx.font='bold 20px "Comic Sans MS","Segoe Print",cursive';
  ctx.textAlign='center';
  for(const p of pops){
    ctx.globalAlpha=1-p.t;
    ctx.fillText(p.text,p.x-cam,p.y-40-p.t*50);
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=1.6;
  for(const sp of sparkles){
    ctx.globalAlpha=1-sp.t/0.7;
    const x=sp.x-cam;
    pencilLine(x-4,sp.y,x+4,sp.y,sp.t*99,0.5,1);
    pencilLine(x,sp.y-4,x,sp.y+4,sp.t*77,0.5,1);
  }
  ctx.globalAlpha=1;
}

// ================= main loop =================
function loop(t){
  const dt=Math.min((t-last)/1000,0.033)||0.016;
  last=t;
  update(dt);
  ctx.clearRect(0,0,W,H);
  const cam=Math.max(0,player.x-W*0.38);
  drawBackground(cam);
  drawGround(cam);
  drawPlatforms(cam);
  drawItems(cam);
  drawHazardsAndEnemies(cam);
  drawPlayer(cam,t);
  drawEffects(cam);
  requestAnimationFrame(loop);
}
player.y=groundY();
window.addEventListener('resize',()=>{if(player.onGround)player.y=groundY();});
updateHud();
</script>
